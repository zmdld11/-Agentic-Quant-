<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic Quant - 量化投研看板</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- 启动加载画面 -->
    <div id="splash" class="splash">
        <div class="splash-content">
            <div class="splash-logo">📊</div>
            <h2>Agentic Quant</h2>
            <p>量化投研看板加载中...</p>
            <div class="splash-bar"><div class="splash-bar-fill"></div></div>
        </div>
    </div>

    <header class="header">
        <h1>📊 Agentic Quant 量化投研看板</h1>
        <div class="header-actions">
            <a href="https://github.com/zmdld11/-Agentic-Quant-" target="_blank" class="github-btn" title="GitHub">
                <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
            </a>
            <button id="themeToggle" class="theme-btn" onclick="toggleTheme()" aria-label="切换主题">🌙</button>
        </div>
    </header>

    <main class="main">
        <div class="search-bar">
            <input type="text" id="symbolInput" placeholder="输入6位A股代码 (如 600519)" maxlength="6" autofocus>
            <button id="analyzeBtn" onclick="doAnalyze()">🔍 分析</button>
            <div class="period-selector">
                <button class="period-btn" data-period="1m">1月</button>
                <button class="period-btn active" data-period="3m">3月</button>
                <button class="period-btn" data-period="6m">6月</button>
                <button class="period-btn" data-period="1y">1年</button>
            </div>
        </div>

        <div id="stockInfo" class="stock-info hidden">
            <span id="stockName" class="stock-name"></span>
            <span id="stockIndustry" class="stock-meta"></span>
            <span id="stockBusiness" class="stock-meta"></span>
        </div>

        <div id="quoteCards" class="quote-cards hidden"></div>

        <div id="klineChart" class="chart-container main-chart"></div>

        <div class="sub-charts">
            <div id="volumeChart" class="chart-container sub-chart"></div>
            <div id="macdChart" class="chart-container sub-chart"></div>
            <div id="rsiChart" class="chart-container sub-chart"></div>
        </div>

        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>AI 正在深度推演，请稍候...</p>
        </div>

        <div id="report" class="report hidden"></div>
        <div id="error" class="error hidden"></div>
    </main>

    <!-- 历史记录侧边栏 -->
    <aside id="historyPanel" class="history-panel">
        <div class="history-tab">📋<br>历<br>史</div>
        <div class="history-body">
            <h3>近期查询</h3>
            <div id="historyList" class="history-list"></div>
            <button id="clearHistory" class="clear-btn" onclick="clearAllHistory()">清除全部</button>
        </div>
    </aside>

    <footer class="footer">
        <p>⚠️ 仅供学术研究与量化技术探讨，不构成任何投资建议。股市有风险，投资需谨慎。</p>
    </footer>

    <script src="/static/app.js"></script>
</body>
</html>
