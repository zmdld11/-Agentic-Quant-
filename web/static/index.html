<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic Quant - 量化投研看板</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- 启动加载画面 -->
    <div id="splash" class="splash">
        <div class="splash-content">
            <div class="splash-logo">📊</div>
            <h2>Agentic Quant</h2>
            <p>量化投研看板加载中...</p>
            <div class="splash-bar"><div class="splash-bar-fill"></div></div>
        </div>
    </div>

    <header class="header">
        <h1>📊 Agentic Quant 量化投研看板</h1>
        <button id="themeToggle" class="theme-btn" onclick="toggleTheme()" aria-label="切换主题">🌙</button>
    </header>

    <main class="main">
        <div class="search-bar">
            <input type="text" id="symbolInput" placeholder="输入6位A股代码 (如 600519)" maxlength="6" autofocus>
            <button id="analyzeBtn" onclick="doAnalyze()">🔍 分析</button>
            <div class="period-selector">
                <button class="period-btn" data-period="1m">1月</button>
                <button class="period-btn active" data-period="3m">3月</button>
                <button class="period-btn" data-period="6m">6月</button>
                <button class="period-btn" data-period="1y">1年</button>
            </div>
        </div>

        <div id="stockInfo" class="stock-info hidden">
            <span id="stockName" class="stock-name"></span>
            <span id="stockIndustry" class="stock-meta"></span>
            <span id="stockBusiness" class="stock-meta"></span>
        </div>

        <div id="quoteCards" class="quote-cards hidden"></div>

        <div id="klineChart" class="chart-container main-chart"></div>

        <div class="sub-charts">
            <div id="volumeChart" class="chart-container sub-chart"></div>
            <div id="macdChart" class="chart-container sub-chart"></div>
            <div id="rsiChart" class="chart-container sub-chart"></div>
        </div>

        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>AI 正在深度推演，请稍候...</p>
        </div>

        <div id="report" class="report hidden"></div>
        <div id="error" class="error hidden"></div>
    </main>

    <!-- 历史记录侧边栏 -->
    <aside id="historyPanel" class="history-panel">
        <div class="history-tab">📋<br>历<br>史</div>
        <div class="history-body">
            <h3>近期查询</h3>
            <div id="historyList" class="history-list"></div>
            <button id="clearHistory" class="clear-btn" onclick="clearAllHistory()">清除全部</button>
        </div>
    </aside>

    <footer class="footer">
        <p>⚠️ 仅供学术研究与量化技术探讨，不构成任何投资建议。股市有风险，投资需谨慎。</p>
    </footer>

    <script src="/static/app.js"></script>
</body>
</html>
